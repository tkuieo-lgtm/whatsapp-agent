version: "3.9"

services:
  whatsapp:
    build: ./whatsapp
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      WHATSAPP_SERVICE_URL: http://whatsapp:3000
    depends_on:
      - whatsapp
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
