server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://backend:8000;
    }

    # React SPA — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
